name: Build Windows Exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install pyinstaller PyQt5 matplotlib numpy

      - name: 打包成 exe
        run: |
          pyinstaller --onefile --windowed --name AxleScore floating_window.py

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: AxleScore
          path: dist/AxleScore.exe
